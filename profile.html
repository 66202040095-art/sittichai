<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>โปรไฟล์ - Seafood Paradise</title>
  <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Anuphan', sans-serif; margin: 0; background: #f7f7f7; padding-bottom: 100px; transition: 0.3s; }
    body.dark-mode { background: #121212; color: white; }
    
    .profile-card { background: white; padding: 30px 20px; text-align: center; border-bottom: 1px solid #eee; transition: 0.3s; }
    .dark-mode .profile-card { background: #1e1e1e; border-color: #333; }
    
    .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; background: white; border-bottom: 1px solid #f2f2f2; transition: 0.3s; }
    .dark-mode .setting-item { background: #1e1e1e; border-color: #333; }

    /* Switch */
    .switch { position: relative; width: 50px; height: 26px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #00b14f; }
    input:checked + .slider:before { transform: translateX(24px); }

    .bottom-nav { position: fixed; bottom: 15px; left: 20px; right: 20px; background: #1a1a1a; border-radius: 30px; display: flex; padding: 12px 0; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    .nav-item { flex: 1; text-align: center; color: #666; text-decoration: none; font-size: 0.7rem; }
    .nav-item.active { color: #00b14f; }
    .nav-icon { font-size: 1.3rem; display: block; margin-bottom: 3px; }
  </style>
</head>
<body id="profileBody">
  <div class="profile-card">
    <div class="avatar" style="font-size:3rem; margin-bottom:10px;">👤</div>
    <h2 style="margin:0">คุณ กกฟกฟ</h2>
    <p style="color:#888; margin:5px 0;">Premium Member</p>
  </div>

  <div style="margin-top: 15px;">
    <div class="setting-item">
      <span>🌙 โหมดมืด (Dark Mode)</span>
      <label class="switch">
        <input type="checkbox" id="darkToggle" onchange="toggleDark()">
        <span class="slider"></span>
      </label>
    </div>
    <div class="setting-item">
      <span>🔔 การแจ้งเตือน</span>
      <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
    </div>
  </div>

  <div class="bottom-nav">
    <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>Home</a>
    <a href="shop-menu.html" class="nav-item"><span class="nav-icon">🍱</span>Menu</a>
    <a href="profile.html" class="nav-item active"><span class="nav-icon">👤</span>Profile</a>
  </div>

  <script>
    if(localStorage.getItem('darkMode') === 'enabled') {
      document.body.classList.add('dark-mode');
      document.getElementById('darkToggle').checked = true;
    }

    function toggleDark() {
      const isDark = document.getElementById('darkToggle').checked;
      if(isDark) {
        document.body.classList.add('dark-mode');
        localStorage.setItem('darkMode', 'enabled');
      } else {
        document.body.classList.remove('dark-mode');
        localStorage.setItem('darkMode', 'disabled');
      }
    }
  </script>
</body>
</html>

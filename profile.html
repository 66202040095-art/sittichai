<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>โปรไฟล์ - Seafood Paradise</title>
  <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Anuphan', sans-serif; margin: 0; background: #f7f7f7; padding-bottom: 100px; transition: 0.3s; }
    body.dark-mode { background: #121212; color: white; }
    
    .profile-card { background: white; padding: 40px 20px; text-align: center; border-bottom: 1px solid #eee; }
    .dark-mode .profile-card { background: #1e1e1e; border-color: #333; }
    
    .avatar { width: 90px; height: 90px; border-radius: 50%; background: #00b14f; color: white; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
    
    .setting-item { display: flex; justify-content: space-between; padding: 18px 20px; background: white; border-bottom: 1px solid #f2f2f2; }
    .dark-mode .setting-item { background: #1e1e1e; border-color: #333; }
    
    .logout-btn { color: #eb4d4b; text-align: center; display: block; margin: 40px auto; font-weight: 700; cursor: pointer; text-decoration: none; padding: 15px; width: 80%; border-radius: 12px; border: 1px solid transparent; transition: 0.3s; }
    .logout-btn.confirm { border-color: #eb4d4b; background: #fff5f5; }

    .bottom-nav { position: fixed; bottom: 15px; left: 20px; right: 20px; background: #1a1a1a; border-radius: 30px; display: flex; padding: 12px 0; }
    .nav-item { flex: 1; text-align: center; color: #666; text-decoration: none; font-size: 0.7rem; }
    .nav-item.active { color: #00b14f; }
  </style>
</head>
<body id="bodyProfile">
  <div class="profile-card">
    <div class="avatar">👤</div>
    <h2 id="displayName" style="margin:0">Loading...</h2>
    <p id="displayPhone" style="color:#888; margin:5px 0;">08x-xxx-xxxx</p>
    <div style="margin-top:10px; font-size:0.8rem; color:#00b14f; font-weight:700; background: rgba(0,177,79,0.1); display: inline-block; padding: 5px 15px; border-radius: 20px;">PRO MEMBER ⭐</div>
  </div>

  <div class="setting-item"><span>ประวัติการสั่งซื้อ</span><span>›</span></div>
  <div class="setting-item"><span>ที่อยู่จัดส่ง</span><span>›</span></div>
  <div class="setting-item"><span>การชำระเงิน</span><span>›</span></div>

  <div class="logout-btn" id="logoutBtn" onclick="handleLogout()">ออกจากระบบ</div>

  <div class="bottom-nav">
    <a href="index.html" class="nav-item"><span style="display:block; font-size:1.3rem;">🏠</span>Home</a>
    <a href="shop-menu.html" class="nav-item"><span style="display:block; font-size:1.3rem;">🍱</span>Menu</a>
    <a href="profile.html" class="nav-item active"><span style="display:block; font-size:1.3rem;">👤</span>Profile</a>
  </div>

  <script>
    window.onload = function() {
      if (localStorage.getItem('isRegistered') !== 'true') {
        window.location.href = 'register.html';
      } else {
        document.getElementById('displayName').innerText = 'คุณ ' + (localStorage.getItem('storedName') || 'ลูกค้า');
        document.getElementById('displayPhone').innerText = localStorage.getItem('storedPhone') || 'ยังไม่ได้ระบุเบอร์';
      }
      if(localStorage.getItem('darkMode') === 'enabled') document.getElementById('bodyProfile').classList.add('dark-mode');
    }

    let logoutStep = 0;
    function handleLogout() {
      const btn = document.getElementById('logoutBtn');
      if (logoutStep === 0) {
        btn.innerText = 'คลิกอีกครั้งเพื่อยืนยันออกจากระบบ';
        btn.classList.add('confirm');
        logoutStep = 1;
        setTimeout(() => {
          btn.innerText = 'ออกจากระบบ';
          btn.classList.remove('confirm');
          logoutStep = 0;
        }, 3000); // ถ้าไม่กดยืนยันใน 3 วิ ให้คืนค่าเดิม
      } else {
        localStorage.removeItem('isRegistered');
        window.location.href = 'index.html';
      }
    }
  </script>
</body>
</html>

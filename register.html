<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สมัครสมาชิก - Seafood Paradise</title>
  <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Anuphan', sans-serif; margin: 0; padding: 40px 20px; background: white; }
    h1 { font-size: 1.8rem; margin-bottom: 10px; }
    p { color: #666; margin-bottom: 30px; }
    .input-box { width: 100%; padding: 15px; background: #f3f3f3; border: none; border-radius: 10px; margin-bottom: 15px; font-family: inherit; font-size: 1rem; }
    .btn { width: 100%; padding: 15px; background: #00b14f; color: white; border: none; border-radius: 10px; font-weight: 700; font-size: 1rem; margin-top: 10px; cursor: pointer; }
  </style>

<body>
  <h1>ยินดีต้อนรับ!</h1>
  <p>กรุณากรอกข้อมูลเพื่อสมัครสมาชิก</p>
  
  <input type="text" class="input-box" placeholder="ชื่อ-นามสกุล">
  <input type="tel" class="input-box" placeholder="เบอร์โทรศัพท์">
  <input type="password" class="input-box" placeholder="รหัสผ่าน">
  
  <button class="btn" onclick="location.href='index.html'">สมัครสมาชิก</button>
  
  <div style="text-align:center; margin-top:20px; color:#888;">
    มีบัญชีแล้ว? <a href="#" style="color:#00b14f; text-decoration:none;">เข้าสู่ระบบ</a>

</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สมัครสมาชิก - Seafood Paradise</title>
  <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Anuphan', sans-serif; margin: 0; padding: 40px 20px; text-align: center; background: #fdfdfd; }
    .reg-box { max-width: 400px; margin: 0 auto; }
    h1 { font-size: 1.8rem; margin-bottom: 5px; }
    p { color: #666; margin-bottom: 30px; }
    
    .input-box { width: 100%; padding: 15px; background: #f3f3f3; border: 1.5px solid transparent; border-radius: 12px; margin-bottom: 5px; font-size: 1rem; box-sizing: border-box; transition: 0.3s; }
    .input-box:focus { background: white; border-color: #00b14f; outline: none; }
    .input-box.error { border-color: #ff4d4d; background: #fff8f8; }
    
    .error-text { color: #ff4d4d; font-size: 0.8rem; text-align: left; margin-bottom: 15px; display: none; padding-left: 5px; }
    
    .btn { width: 100%; padding: 15px; background: #00b14f; color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 1.1rem; cursor: pointer; margin-top: 10px; }
    .back-link { display: block; margin-top: 25px; color: #888; text-decoration: none; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="reg-box">
    <h1>สร้างบัญชีใหม่ ✨</h1>
    <p>เริ่มต้นสัมผัสความสดจากทะเลวันนี้</p>
    
    <input type="text" id="userName" class="input-box" placeholder="ชื่อ-นามสกุล">
    <div id="nameError" class="error-text">⚠️ กรุณากรอกชื่อ-นามสกุล</div>

    <input type="tel" id="userPhone" class="input-box" placeholder="เบอร์โทรศัพท์">
    <div id="phoneError" class="error-text">⚠️ กรุณากรอกเบอร์โทรศัพท์ที่ถูกต้อง</div>

    <input type="password" id="userPass" class="input-box" placeholder="ตั้งรหัสผ่าน">
    <div id="passError" class="error-text">⚠️ กรุณาตั้งรหัสผ่าน</div>
    
    <button class="btn" onclick="saveUser()">ยืนยันการสมัคร</button>
    <a href="index.html" class="back-link">ย้อนกลับหน้าหลัก</a>
  </div>

  <script>
    function saveUser() {
      const name = document.getElementById('userName').value;
      const phone = document.getElementById('userPhone').value;
      const pass = document.getElementById('userPass').value;
      
      // ล้าง Error เก่า
      document.querySelectorAll('.error-text').forEach(t => t.style.display = 'none');
      document.querySelectorAll('.input-box').forEach(i => i.classList.remove('error'));

      let isValid = true;

      if(!name) {
        document.getElementById('nameError').style.display = 'block';
        document.getElementById('userName').classList.add('error');
        isValid = false;
      }
      if(!phone) {
        document.getElementById('phoneError').style.display = 'block';
        document.getElementById('userPhone').classList.add('error');
        isValid = false;
      }
      if(!pass) {
        document.getElementById('passError').style.display = 'block';
        document.getElementById('userPass').classList.add('error');
        isValid = false;
      }

      if(isValid) {
        localStorage.setItem('isRegistered', 'true');
        localStorage.setItem('storedName', name);
        localStorage.setItem('storedPhone', phone);
        window.location.href = 'profile.html';
      }
    }
  </script>
</body>
</html>

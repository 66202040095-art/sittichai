<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exclusive Menu - Seafood Paradise</title>
  <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Anuphan', sans-serif; margin: 0; background: #fff; padding-bottom: 140px; transition: 0.3s; color: #1a1a1a; }
    body.dark-mode { background: #121212; color: white; }
    .header { padding: 20px; position: sticky; top:0; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); z-index:100; font-weight:700; font-size:1.2rem; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; }
    .dark-mode .header { background: rgba(18,18,18,0.95); border-color: #333; }
    .back-btn { font-size: 1.8rem; margin-right: 15px; cursor: pointer; line-height: 1; }
    .menu-list { padding: 10px 20px; }
    .menu-item { display: flex; padding: 20px 0; border-bottom: 1px solid #f8f8f8; align-items: center; }
    .dark-mode .menu-item { border-color: #222; }
    .menu-info { flex: 1; padding-right: 20px; }
    .menu-name { font-weight: 700; font-size: 1.1rem; }
    .menu-desc { font-size: 0.8rem; color: #888; margin-bottom: 8px; }
    .menu-price { font-weight: 700; color: #00b14f; }
    .img-box { position: relative; width: 110px; height: 110px; }
    .menu-img { width: 100%; height: 100%; border-radius: 18px; object-fit: cover; }
    .add-btn { position: absolute; bottom: -5px; right: -5px; background: #1a1a1a; color: white; border-radius: 12px; padding: 8px 12px; font-weight: 700; border: none; cursor: pointer; }
    .dark-mode .add-btn { background: #00b14f; }
    .checkout-bar { position: fixed; bottom: 30px; left: 20px; right: 20px; background: #1a1a1a; border-radius: 20px; padding: 20px; display: none; align-items: center; justify-content: space-between; color: white; z-index: 1000; }
  </style>
</head>
<body>
  <script>
    // แก้ไขตรงนี้จาก userRegistered เป็น isRegistered ให้ตรงกับหน้าอื่นๆ
    if (localStorage.getItem('isRegistered') !== 'true') {
      window.location.href = 'register.html';
    }
  </script>

  <div class="header">
    <span class="back-btn" onclick="location.href='index.html'">‹</span>
    Luxury Menu
  </div>

  <div class="menu-list" id="menu-container"></div>

  <div id="checkoutBar" class="checkout-bar">
    <div>
      <div style="font-size: 0.8rem; opacity: 0.6;">ยอดรวม</div>
      <div id="totalPrice" style="font-size: 1.2rem; font-weight: 700;">฿0</div>
    </div>
    <button style="background:#00b14f; color:white; border:none; padding:12px 25px; border-radius:12px; font-weight:700;" onclick="location.href='checkout.html'">ชำระเงิน</button>
  </div>

  <script>
    if (localStorage.getItem('darkMode') === 'enabled') document.body.classList.add('dark-mode');

    const products = [
      { name: "Lobster Thermidor", price: 2450, desc: "ล็อบสเตอร์ยักษ์อบชีส", img: "https://images.unsplash.com/photo-1559737558-2f5a35f4523b?w=400" },
      { name: "Premium King Crab", price: 3800, desc: "ปูยักษ์อลาสก้านึ่งสดใหม่", img: "https://images.unsplash.com/photo-1550950158-d0d960dff51b?w=400" },
      { name: "Snow Fish Truffle", price: 950, desc: "ปลาหิมะย่างซอสทรัฟเฟิล", img: "https://images.unsplash.com/photo-1599084993091-1cb5c0721cc6?w=400" }
    ];

    let total = 0;
    const container = document.getElementById('menu-container');
    products.forEach(p => {
      container.innerHTML += `
        <div class="menu-item">
          <div class="menu-info">
            <div class="menu-name">${p.name}</div>
            <div class="menu-desc">${p.desc}</div>
            <div class="menu-price">฿${p.price.toLocaleString()}</div>
          </div>
          <div class="img-box">
            <img src="${p.img}" class="menu-img">
            <button class="add-btn" onclick="addToCart(${p.price})">ADD</button>
          </div>
        </div>
      `;
    });

    function addToCart(price) {
      total += price;
      document.getElementById('checkoutBar').style.display = 'flex';
      document.getElementById('totalPrice').innerText = '฿' + total.toLocaleString();
      localStorage.setItem('tempTotal', total);
    }
  </script>
</body>
</html>

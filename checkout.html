<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ชำระเงิน - Seafood Paradise</title>
  <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Anuphan', sans-serif; margin: 0; background: #fdfdfd; padding: 20px; transition: 0.3s; color: #333; }
    body.dark-mode { background: #121212; color: white; }
    .header { display: flex; align-items: center; margin-bottom: 25px; }
    .back-btn { font-size: 1.8rem; cursor: pointer; margin-right: 15px; }
    
    .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .dark-mode .card { background: #1e1e1e; box-shadow: 0 8px 25px rgba(0,0,0,0.3); }

    .summary-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.9rem; opacity: 0.8; }
    .total-row { display: flex; justify-content: space-between; padding-top: 15px; border-top: 1px solid #eee; font-weight: 700; font-size: 1.2rem; color: #00b14f; }
    
    .payment-option { 
      border: 2px solid #f0f0f0; border-radius: 15px; padding: 15px; display: flex; align-items: center; 
      gap: 15px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; 
    }
    .dark-mode .payment-option { border-color: #333; }
    .payment-option.active { border-color: #00b14f; background: #f0fff4; }
    .dark-mode .payment-option.active { background: #004d26; }

    .pay-btn { 
      width: 100%; padding: 18px; background: #00b14f; color: white; border: none; 
      border-radius: 15px; font-weight: 700; font-size: 1.1rem; cursor: pointer; margin-top: 20px; 
    }

    /* Loading Overlay */
    #loader { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); 
      display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
    }
    .dark-mode #loader { background: rgba(18,18,18,0.95); }
    .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #00b14f; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body id="payPage">
  <div id="loader">
    <div class="spinner"></div>
    <p style="margin-top:20px; font-weight:700;">กำลังตรวจสอบยอดชำระ...</p>
  </div>

  <div class="header">
    <div class="back-btn" onclick="history.back()">‹</div>
    <h2 style="margin:0">ชำระเงิน</h2>
  </div>

  <div class="card">
    <div class="summary-row"><span>รายการอาหาร</span> <span id="foodPrice">฿0</span></div>
    <div class="summary-row"><span>ค่าส่ง (Express)</span> <span>฿60</span></div>
    <div class="total-row"><span>ยอดชำระทั้งหมด</span> <span id="finalPrice">฿0</span></div>
  </div>

  <h3 style="font-size: 1rem; margin-bottom: 15px;">ช่องทางชำระเงิน</h3>
  <div class="payment-option active" onclick="setPay(this)">
    <span style="font-size: 1.5rem;">💳</span>
    <div>
      <div style="font-weight:700;">บัตรเครดิต / เดบิต</div>
      <div style="font-size: 0.7rem; opacity: 0.6;">Visa, Mastercard, JCB</div>
    </div>
  </div>
  <div class="payment-option" onclick="setPay(this)">
    <span style="font-size: 1.5rem;">📱</span>
    <div>
      <div style="font-weight:700;">PromptPay / QR Code</div>
      <div style="font-size: 0.7rem; opacity: 0.6;">สแกนเพื่อจ่ายทันที</div>
    </div>
  </div>
  <div class="payment-option" onclick="setPay(this)">
    <span style="font-size: 1.5rem;">💵</span>
    <div>
      <div style="font-weight:700;">เงินสดปลายทาง</div>
      <div style="font-size: 0.7rem; opacity: 0.6;">ชำระเมื่อได้รับอาหาร</div>
    </div>
  </div>

  <button class="pay-btn" onclick="processPayment()">ชำระเงินด้วยความปลอดภัย</button>

  <script>
    if(localStorage.getItem('darkMode') === 'enabled') document.body.classList.add('dark-mode');

    const total = parseInt(localStorage.getItem('tempTotal')) || 0;
    document.getElementById('foodPrice').innerText = '฿' + total.toLocaleString();
    document.getElementById('finalPrice').innerText = '฿' + (total + 60).toLocaleString();

    function setPay(el) {
      document.querySelectorAll('.payment-option').forEach(opt => opt.classList.remove('active'));
      el.classList.add('active');
    }

    function processPayment() {
      document.getElementById('loader').style.display = 'flex';
      setTimeout(() => {
        alert('🎉 ชำระเงินสำเร็จ!\nคำสั่งซื้อของคุณถูกส่งไปยังเชฟแล้ว');
        localStorage.removeItem('tempTotal');
        location.href = 'index.html';
      }, 2500);
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Seafood Paradise - Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;500;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Anuphan', sans-serif; margin: 0; background: #ffffff; color: #1a1a1a; padding-bottom: 90px; transition: 0.3s; }
    body.dark-mode { background: #121212; color: #e0e0e0; }
    
    .header-top { padding: 25px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
    .brand-name { font-family: 'Playfair Display', serif; font-size: 1.5rem; letter-spacing: 1px; color: #004d26; }
    
    .hero-premium { position: relative; margin: 15px 20px; height: 200px; border-radius: 25px; overflow: hidden; background: url('https://images.unsplash.com/photo-1551248429-40975aa4de74?w=800') center/cover; }
    .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.7), transparent); display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; color: white; }
    
    .section-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
    .view-all { color: #00b14f; text-decoration: none; font-weight: 600; cursor: pointer; }
    
    .premium-scroll { display: flex; overflow-x: auto; padding: 0 20px; gap: 15px; scrollbar-width: none; }
    .p-card { min-width: 160px; background: #fff; border-radius: 20px; padding: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; }
    .dark-mode .p-card { background: #1e1e1e; }
    .p-img { width: 100%; height: 110px; border-radius: 15px; object-fit: cover; }

    /* Toast Notification Style */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(0, 0, 0, 0.85);
      color: white;
      padding: 12px 25px;
      border-radius: 50px;
      font-size: 0.9rem;
      z-index: 2000;
      transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      opacity: 0;
      white-space: nowrap;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    .bottom-nav { position: fixed; bottom: 15px; left: 20px; right: 20px; background: #1a1a1a; border-radius: 30px; display: flex; padding: 12px 0; z-index: 1000; }
    .nav-item { flex: 1; text-align: center; color: #666; text-decoration: none; font-size: 0.7rem; cursor: pointer; }
    .nav-item.active { color: #00b14f; }
    .nav-icon { font-size: 1.3rem; display: block; margin-bottom: 3px; }
  </style>
</head>
<body>

  <div class="header-top">
    <div class="brand-name">Seafood Paradise</div>
    <div style="font-size: 1.2rem;">🛒</div>
  </div>

  <div class="hero-premium">
    <div class="hero-overlay">
      <h2 style="margin:0">Premium Member Only</h2>
      <p style="margin:0; font-size: 0.8rem; opacity: 0.8;">เข้าสู่ระบบเพื่อรับสิทธิพิเศษวันนี้</p>
    </div>
  </div>

  <div class="section-header">
    <h3>เมนูแนะนำ</h3>
    <div class="view-all" onclick="checkAuth('shop-menu.html')">ดูทั้งหมด ›</div>
  </div>

  <div class="premium-scroll" id="menu-list"></div>

  <div id="toast" class="toast">🔒 กรุณาสมัครสมาชิกก่อนครับ</div>

  <div class="bottom-nav">
    <div class="nav-item active" onclick="location.href='index.html'"><span class="nav-icon">🏠</span>Home</div>
    <div class="nav-item" onclick="checkAuth('shop-menu.html')"><span class="nav-icon">🍱</span>Menu</div>
    <div class="nav-item" onclick="checkAuth('profile.html')"><span class="nav-icon">👤</span>Profile</div>
  </div>

  <script>
    if(localStorage.getItem('darkMode') === 'enabled') document.body.classList.add('dark-mode');

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.innerText = message;
      toast.classList.add('show');
      setTimeout(() => { toast.classList.remove('show'); }, 3000);
    }

    function checkAuth(targetUrl) {
      const isRegistered = localStorage.getItem('isRegistered');
      if (isRegistered === 'true') {
        window.location.href = targetUrl;
      } else {
        showToast('🔒 เฉพาะสมาชิกเท่านั้น กำลังไปหน้าสมัครสมาชิก...');
        setTimeout(() => {
          window.location.href = 'register.html';
        }, 1500);
      }
    }

    const items = [
      { name: "กุ้งแม่น้ำ XXL", price: "1,290", img: "https://images.unsplash.com/photo-1559737558-2f5a35f4523b?w=400" },
      { name: "ปูม้านึ่งเกรด A", price: "850", img: "https://images.unsplash.com/photo-1550950158-d0d960dff51b?w=400" }
    ];

    items.forEach(item => {
      document.getElementById('menu-list').innerHTML += `
        <div class="p-card" onclick="checkAuth('shop-menu.html')">
          <img src="${item.img}" class="p-img">
          <div style="font-weight:600; margin-top:8px;">${item.name}</div>
          <div style="color:#00b14f; font-weight:700;">฿${item.price}</div>
        </div>
      `;
    });
  </script>
</body>
</html>
